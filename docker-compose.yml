services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: opensoul
      POSTGRES_PASSWORD: opensoul
      POSTGRES_DB: opensoul
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensoul -d opensoul"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3200:3200"
    environment:
      DATABASE_URL: postgres://opensoul:opensoul@db:5432/opensoul
      PORT: "3200"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3200}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - opensoul-data:/opensoul
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  opensoul-data:
